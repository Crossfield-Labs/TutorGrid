name: frontend-build

on:
  pull_request:
    paths:
      - "TutorGridFront/**"
      - ".github/workflows/frontend-build.yml"
      - ".github/actions/setup-frontend/**"
  push:
    paths:
      - "TutorGridFront/**"
      - ".github/workflows/frontend-build.yml"
      - ".github/actions/setup-frontend/**"
  workflow_dispatch:

concurrency:
  group: frontend-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-build:
    name: frontend build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up frontend
        uses: ./.github/actions/setup-frontend
        with:
          node-version: "20"

      - name: Build frontend
        working-directory: TutorGridFront
        run: |
          yarn build
