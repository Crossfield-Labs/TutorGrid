name: docs-quality

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: docs-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs-quality:
    name: docs quality
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python project
        uses: ./.github/actions/setup-python-project
        with:
          python-version: "3.12"

      - name: Markdown link sanity
        run: |
          python scripts/check_markdown_links.py
