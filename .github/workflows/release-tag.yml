name: release-tag

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-tag-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build-tag-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Compute build metadata
        shell: bash
        run: |
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"
          echo "BUILD_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: ./.github/actions/setup-python-project
        with:
          python-version: "3.12"

      - name: Set up frontend
        uses: ./.github/actions/setup-frontend
        with:
          node-version: "22.12.0"

      - name: Install packaging dependency
        run: python -m pip install pyinstaller

      - name: Build backend executable
        run: |
          pyinstaller --noconfirm --onefile --name pc-orchestrator-backend backend/main.py

      - name: Stage backend binary for electron package (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p TutorGridFront/backend-bin
          cp dist/pc-orchestrator-backend TutorGridFront/backend-bin/pc-orchestrator-backend

      - name: Stage backend binary for electron package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path TutorGridFront/backend-bin -Force | Out-Null
          Copy-Item dist/pc-orchestrator-backend.exe TutorGridFront/backend-bin/pc-orchestrator-backend.exe

      - name: Build frontend and desktop executable
        working-directory: TutorGridFront
        run: |
          yarn electron:build

      - name: Package source tarballs (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist-release
          tar -czf dist-release/backend-${BUILD_TAG}-${{ runner.os }}-${SHORT_SHA}.tar.gz backend requirements.txt config.example.json
          tar -czf dist-release/frontend-${BUILD_TAG}-${{ runner.os }}-${SHORT_SHA}.tar.gz TutorGridFront/dist TutorGridFront/dist-electron TutorGridFront/electron TutorGridFront/package.json TutorGridFront/yarn.lock

      - name: Package source tarballs (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist-release -Force | Out-Null
          tar -czf dist-release/backend-$env:BUILD_TAG-${{ runner.os }}-$env:SHORT_SHA.tar.gz backend requirements.txt config.example.json
          tar -czf dist-release/frontend-$env:BUILD_TAG-${{ runner.os }}-$env:SHORT_SHA.tar.gz TutorGridFront/dist TutorGridFront/dist-electron TutorGridFront/electron TutorGridFront/package.json TutorGridFront/yarn.lock

      - name: Collect binary artifacts (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist-release
          cp dist/pc-orchestrator-backend dist-release/pc-orchestrator-backend-${BUILD_TAG}-${{ runner.os }}-${SHORT_SHA}
          find TutorGridFront/release -maxdepth 1 -type f \( -name "*.AppImage" -o -name "*.dmg" -o -name "*.exe" \) | while read -r file; do
            ext="${file##*.}"
            cp "$file" "dist-release/pc-orchestrator-frontend-${BUILD_TAG}-${{ runner.os }}-${SHORT_SHA}.${ext}"
          done

      - name: Collect binary artifacts (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist-release -Force | Out-Null
          Copy-Item dist/pc-orchestrator-backend.exe dist-release/pc-orchestrator-backend-$env:BUILD_TAG-${{ runner.os }}-$env:SHORT_SHA.exe
          $frontendArtifact = Get-ChildItem TutorGridFront/release -File -Include *.exe,*.msi | Select-Object -First 1
          if ($null -ne $frontendArtifact) {
            $ext = $frontendArtifact.Extension
            Copy-Item $frontendArtifact.FullName "dist-release/pc-orchestrator-frontend-$env:BUILD_TAG-${{ runner.os }}-$env:SHORT_SHA$ext"
          }

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: tag-${{ matrix.os }}
          path: dist-release/*

  publish:
    name: publish-tag-release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets

      - name: Flatten artifacts
        run: |
          mkdir -p final-assets
          find release-assets -type f -exec cp {} final-assets/ \;

      - name: Publish tag release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generateReleaseNotes: true
          artifacts: final-assets/*
