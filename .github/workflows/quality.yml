name: quality

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Validate JSON config files
        run: |
          python -c "import json, pathlib; [json.loads(pathlib.Path(name).read_text(encoding='utf-8')) for name in ('config.example.json',)]"

      - name: Compile project source tree
        run: |
          python -m compileall agent dev llm providers runners runtime server sessions state tests tools workers main.py config.py

      - name: Import smoke check
        run: |
          python -c "import main, config, server.app, server.protocol, runtime.runtime, runners.router, workers.registry, sessions.manager"

      - name: CLI smoke check
        run: |
          python main.py --help
          python -m dev.run_runtime --help
