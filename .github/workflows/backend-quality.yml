name: backend-quality

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: backend-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-quality:
    name: backend quality
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python project
        uses: ./.github/actions/setup-python-project
        with:
          python-version: "3.12"

      - name: Validate JSON config files
        run: |
          python -c "import json, pathlib; [json.loads(pathlib.Path(name).read_text(encoding='utf-8-sig')) for name in ('config.example.json',)]"

      - name: Validate harness task files
        run: |
          python -c "import json, pathlib; [json.loads(path.read_text(encoding='utf-8-sig')) for path in pathlib.Path('harness/tasks').glob('*.json')]"

      - name: Compile project source tree
        run: |
          python -m compileall backend harness docs tests scripts

      - name: Import smoke check
        run: |
          python -c "import backend.main, backend.config, backend.server.app, backend.server.protocol, backend.runtime.runtime, backend.runners.router, backend.workers.registry, backend.sessions.manager, harness.runner, harness.evaluator, harness.models"

      - name: CLI smoke check
        run: |
          python -m backend.main --help
          python -m backend.dev.run_runtime --help
          python -m harness.runner --help
