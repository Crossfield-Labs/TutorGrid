name: release-dev

on:
  push:
    branches:
      - master
      - main
      - develop
    tags-ignore:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-dev
  cancel-in-progress: true

jobs:
  build:
    name: build-dev-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Compute build metadata
        shell: bash
        run: |
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"
          echo "BUILD_TAG=dev" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: ./.github/actions/setup-python-project
        with:
          python-version: "3.12"

      - name: Set up frontend
        uses: ./.github/actions/setup-frontend
        with:
          node-version: "20"

      - name: Install packaging dependency
        run: python -m pip install pyinstaller

      - name: Build backend executable
        run: |
          pyinstaller --noconfirm --onefile --name pc-orchestrator-backend main.py

      - name: Stage backend binary for electron package (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p frontend/backend-bin
          cp dist/pc-orchestrator-backend frontend/backend-bin/pc-orchestrator-backend

      - name: Stage backend binary for electron package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path frontend/backend-bin -Force | Out-Null
          Copy-Item dist/pc-orchestrator-backend.exe frontend/backend-bin/pc-orchestrator-backend.exe

      - name: Build frontend and desktop executable
        working-directory: frontend
        run: |
          npm run build
          npm run package:desktop

      - name: Package source tarballs (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist-release
          tar -czf dist-release/backend-${BUILD_TAG}-${{ runner.os }}-${SHORT_SHA}.tar.gz backend main.py requirements.txt config.example.json
          tar -czf dist-release/frontend-${BUILD_TAG}-${{ runner.os }}-${SHORT_SHA}.tar.gz frontend/dist frontend/electron frontend/package.json frontend/package-lock.json

      - name: Package source tarballs (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist-release -Force | Out-Null
          tar -czf dist-release/backend-$env:BUILD_TAG-${{ runner.os }}-$env:SHORT_SHA.tar.gz backend main.py requirements.txt config.example.json
          tar -czf dist-release/frontend-$env:BUILD_TAG-${{ runner.os }}-$env:SHORT_SHA.tar.gz frontend/dist frontend/electron frontend/package.json frontend/package-lock.json

      - name: Collect binary artifacts (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist-release
          cp dist/pc-orchestrator-backend dist-release/pc-orchestrator-backend-${BUILD_TAG}-${{ runner.os }}-${SHORT_SHA}
          find frontend/release -maxdepth 1 -type f \( -name "*.AppImage" -o -name "*.dmg" -o -name "*.exe" \) | while read -r file; do
            ext="${file##*.}"
            cp "$file" "dist-release/pc-orchestrator-frontend-${BUILD_TAG}-${{ runner.os }}-${SHORT_SHA}.${ext}"
          done

      - name: Collect binary artifacts (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist-release -Force | Out-Null
          Copy-Item dist/pc-orchestrator-backend.exe dist-release/pc-orchestrator-backend-$env:BUILD_TAG-${{ runner.os }}-$env:SHORT_SHA.exe
          $frontendArtifact = Get-ChildItem frontend/release -File -Include *.exe,*.msi | Select-Object -First 1
          if ($null -ne $frontendArtifact) {
            $ext = $frontendArtifact.Extension
            Copy-Item $frontendArtifact.FullName "dist-release/pc-orchestrator-frontend-$env:BUILD_TAG-${{ runner.os }}-$env:SHORT_SHA$ext"
          }

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dev-${{ matrix.os }}
          path: dist-release/*

  publish:
    name: publish-dev-release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets

      - name: Flatten artifacts
        run: |
          mkdir -p final-assets
          find release-assets -type f -exec cp {} final-assets/ \;

      - name: Move dev tag to current commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -d dev || true
          git push origin :refs/tags/dev || true
          git tag dev
          git push origin refs/tags/dev

      - name: Publish/Update dev release
        uses: ncipollo/release-action@v1
        with:
          tag: dev
          name: dev
          prerelease: true
          allowUpdates: true
          replacesArtifacts: true
          removeArtifacts: true
          generateReleaseNotes: false
          body: |
            Continuous dev release.
            This release is overwritten on each push.
          artifacts: final-assets/*
